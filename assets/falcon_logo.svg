<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background -->
  <rect width="300" height="300" fill="#0f172a"/>
  
  <!-- Sky gradient effect -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="falconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" fill="url(#skyGrad)"/>
  
  <!-- Falcon body (simplified geometric) -->
  <g id="falcon">
    <!-- Wing spread left -->
    <path d="M 80 120 L 50 100 L 40 110 L 70 130 Z" fill="url(#falconGrad)" stroke="#f8fafc" stroke-width="2"/>
    <path d="M 80 120 L 50 100 L 45 105 L 75 125 Z" fill="#fcd34d" opacity="0.6"/>
    
    <!-- Wing spread right -->
    <path d="M 220 120 L 250 100 L 260 110 L 230 130 Z" fill="url(#falconGrad)" stroke="#f8fafc" stroke-width="2"/>
    <path d="M 220 120 L 250 100 L 255 105 L 225 125 Z" fill="#fcd34d" opacity="0.6"/>
    
    <!-- Body -->
    <ellipse cx="150" cy="140" rx="35" ry="50" fill="url(#falconGrad)" stroke="#f8fafc" stroke-width="2"/>
    
    <!-- Head -->
    <circle cx="150" cy="80" r="25" fill="url(#falconGrad)" stroke="#f8fafc" stroke-width="2"/>
    
    <!-- Eye -->
    <circle cx="160" cy="75" r="6" fill="#1f2937" stroke="#f8fafc" stroke-width="1"/>
    <circle cx="162" cy="73" r="2" fill="#f8fafc"/>
    
    <!-- Beak -->
    <path d="M 170 80 L 190 78 L 175 85 Z" fill="#92400e" stroke="#f8fafc" stroke-width="1"/>
    
    <!-- Tail feathers (speed lines) -->
    <path d="M 150 190 L 140 220" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <path d="M 160 190 L 170 220" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <path d="M 150 190 L 150 230" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Speed motion lines -->
    <line x1="30" y1="110" x2="50" y2="105" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="25" y1="130" x2="45" y2="130" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="270" y1="110" x2="250" y2="105" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="275" y1="130" x2="255" y2="130" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Text: Velocity Claw -->
  <text x="150" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc">
    VELOCITY CLAW
  </text>
  <text x="150" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#60a5fa" letter-spacing="2">
    AI AGENT • FAST • PRECISE
  </text>
</svg>
