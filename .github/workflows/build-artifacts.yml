name: build-artifacts

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "pyproject.toml"
      - "VERSION"
      - "velocity_claw/**"
      - "scripts/validate_package.py"
      - ".github/workflows/build-artifacts.yml"

permissions:
  contents: read

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Validate package metadata
        run: python scripts/validate_package.py

      - name: Run tests
        run: pytest -q 2>&1 | tee pytest-output.txt

      - name: Upload pytest failure output
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-pytest-failure-output
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 7

      - name: Build Python artifacts
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-artifacts
          path: dist/*
          if-no-files-found: error
          retention-days: 7
