name: publish-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build

      - name: Validate package metadata
        run: |
          python scripts/validate_package.py

      - name: Run tests
        run: |
          pytest -q

      - name: Validate release tag matches VERSION
        run: |
          VERSION_VALUE="$(cat VERSION | tr -d '[:space:]')"
          EXPECTED_TAG="v${VERSION_VALUE}"
          if [ "${{ inputs.tag }}" != "$EXPECTED_TAG" ]; then
            echo "Release tag ${{ inputs.tag }} does not match VERSION $EXPECTED_TAG" >&2
            exit 1
          fi

      - name: Build Python artifacts
        run: |
          python -m build

      - name: Generate release notes
        run: |
          python scripts/generate_release_notes.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Velocity Claw ${{ inputs.tag }}
          body_path: dist/release-notes.md
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/*
