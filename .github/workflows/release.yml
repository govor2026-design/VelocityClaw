# Release automation v2 is active on the default branch.
name: release

on:
  push:
    branches:
      - master
    paths:
      - VERSION
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag; must match VERSION, for example v0.2.4"
        required: true
        type: string
      target_sha:
        description: "Exact commit SHA to publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build pip-audit

      - name: Validate package metadata
        run: |
          set -euo pipefail
          python scripts/validate_package.py

      - name: Run tests
        run: |
          set -euo pipefail
          pytest -q 2>&1 | tee pytest-output.txt

      - name: Audit dependencies
        run: |
          set -euo pipefail
          pip-audit -r requirements.txt

      - name: Resolve release tag and target
        id: release
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          EXPECTED_TAG="v${VERSION_VALUE}"
          TARGET_SHA="$(git rev-parse HEAD)"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            REQUESTED_TAG="${MANUAL_TAG}"
          else
            REQUESTED_TAG="${EXPECTED_TAG}"
          fi

          if [[ "${REQUESTED_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Release tag ${REQUESTED_TAG} does not match VERSION ${EXPECTED_TAG}" >&2
            exit 1
          fi

          echo "version=${VERSION_VALUE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${EXPECTED_TAG}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${TARGET_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Inspect existing tag and release
        id: state
        env:
          TAG_VALUE: ${{ steps.release.outputs.tag }}
          TARGET_SHA: ${{ steps.release.outputs.target_sha }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          TAG_SHA=""
          if git show-ref --verify --quiet "refs/tags/${TAG_VALUE}"; then
            TAG_SHA="$(git rev-list -n 1 "${TAG_VALUE}")"
          fi

          if gh release view "${TAG_VALUE}" >/dev/null 2>&1; then
            RELEASE_EXISTS="true"
          else
            RELEASE_EXISTS="false"
          fi

          if [[ -n "${TAG_SHA}" && "${TAG_SHA}" != "${TARGET_SHA}" ]]; then
            echo "Tag ${TAG_VALUE} points to ${TAG_SHA}, expected ${TARGET_SHA}" >&2
            exit 1
          fi

          echo "tag_sha=${TAG_SHA}" >> "${GITHUB_OUTPUT}"
          echo "release_exists=${RELEASE_EXISTS}" >> "${GITHUB_OUTPUT}"

      - name: Build Python artifacts
        run: |
          set -euo pipefail
          rm -rf dist build
          python -m build

      - name: Generate release notes
        run: |
          set -euo pipefail
          python scripts/generate_release_notes.py

      - name: Generate release summary
        env:
          VERSION_VALUE: ${{ steps.release.outputs.version }}
          TAG_VALUE: ${{ steps.release.outputs.tag }}
          TARGET_SHA: ${{ steps.release.outputs.target_sha }}
        run: |
          set -euo pipefail
          {
            echo "# Velocity Claw ${VERSION_VALUE}"
            echo
            echo "## Validation"
            echo
            echo "- Package metadata validated"
            echo "- Tests passed"
            echo "- Dependency audit passed"
            echo "- Wheel and source distribution built"
            echo "- Release tag ${TAG_VALUE} matched VERSION"
            echo "- Release target commit: ${TARGET_SHA}"
            echo
            echo "## Release docs"
            echo
            echo "- CHANGELOG.md"
            echo "- docs/RELEASE.md"
            echo "- docs/RELEASE_AUTOMATION.md"
            echo "- docs/RELEASE_BOOTSTRAP.md"
            echo "- docs/DEPLOYMENT.md"
          } > dist/release-summary.md

      - name: Publish or update GitHub Release
        env:
          RELEASE_EXISTS: ${{ steps.state.outputs.release_exists }}
          TAG_VALUE: ${{ steps.release.outputs.tag }}
          VERSION_VALUE: ${{ steps.release.outputs.version }}
          TARGET_SHA: ${{ steps.release.outputs.target_sha }}
        run: |
          set -euo pipefail

          if [[ "${RELEASE_EXISTS}" == "true" ]]; then
            if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
              echo "Release ${TAG_VALUE} already exists; automatic runs preserve immutable release assets."
            else
              gh release edit "${TAG_VALUE}" \
                --title "Velocity Claw ${VERSION_VALUE}" \
                --notes-file dist/release-notes.md
              gh release upload "${TAG_VALUE}" \
                dist/*.whl \
                dist/*.tar.gz \
                dist/release-summary.md \
                --clobber
            fi
          else
            gh release create "${TAG_VALUE}" \
              dist/*.whl \
              dist/*.tar.gz \
              dist/release-summary.md \
              --target "${TARGET_SHA}" \
              --title "Velocity Claw ${VERSION_VALUE}" \
              --notes-file dist/release-notes.md
          fi

      - name: Verify published release
        env:
          TAG_VALUE: ${{ steps.release.outputs.tag }}
          TARGET_SHA: ${{ steps.release.outputs.target_sha }}
        run: |
          set -euo pipefail
          gh release view "${TAG_VALUE}" --json tagName,name,isDraft,isPrerelease
          git fetch --tags --force
          PUBLISHED_SHA="$(git rev-list -n 1 "${TAG_VALUE}")"
          test "${PUBLISHED_SHA}" = "${TARGET_SHA}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ steps.release.outputs.tag }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/release-summary.md
            dist/release-notes.md
          if-no-files-found: error
          retention-days: 90

      - name: Upload pytest failure output
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-pytest-failure-output
          path: pytest-output.txt
          if-no-files-found: ignore
          retention-days: 7
