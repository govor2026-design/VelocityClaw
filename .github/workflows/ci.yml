name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate package metadata
        run: python scripts/validate_package.py

      - name: Run tests
        run: pytest -q 2>&1 | tee pytest-output.txt

      - name: Upload pytest failure output
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-failure-output
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 7
